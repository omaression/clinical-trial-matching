services:
  app:
    build: .
    ports: ["8000:8000"]
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./app:/app/app
      - ./data:/app/data

  db:
    image: postgres:16
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: clinical_trials
      POSTGRES_USER: ctm
      POSTGRES_PASSWORD: ctm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U ctm -d clinical_trials
      interval: 5s
      retries: 5

volumes:
  pgdata:
