services:
  app:
    build: .
    ports: ["8000:8000"]
    environment:
      CTM_DATABASE_URL: ${CTM_DATABASE_URL:-postgresql://ctm:ctm@db:5432/clinical_trials}
      CTM_API_KEY: ${CTM_API_KEY:-local-dev-api-key}
      CTM_RUN_MIGRATIONS: "1"
      PORT: "8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports: ["3000:3000"]
    environment:
      CTM_FRONTEND_API_BASE_URL: http://app:8000/api/v1
      CTM_FRONTEND_API_KEY: ${CTM_API_KEY:-local-dev-api-key}
      PORT: "3000"
    depends_on:
      - app

  db:
    image: postgres:16
    ports: ["5432:5432"]
    environment:
      POSTGRES_DB: clinical_trials
      POSTGRES_USER: ctm
      POSTGRES_PASSWORD: ctm
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U ctm -d clinical_trials
      interval: 5s
      retries: 5

volumes:
  pgdata:
