name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install backend dependencies
        run: |
          uv venv --python 3.12 .ctm-dev
          uv pip install --python .ctm-dev/bin/python -e ".[dev]"

      - name: Detect changed Python files
        id: changed-python
        uses: tj-actions/changed-files@v45
        with:
          files: |
            **/*.py

      - name: Ruff (changed Python files only)
        if: steps.changed-python.outputs.any_changed == 'true'
        run: ./.ctm-dev/bin/ruff check ${{ steps.changed-python.outputs.all_changed_files }}

      - name: Backend tests
        run: ./.ctm-dev/bin/pytest -q

  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
